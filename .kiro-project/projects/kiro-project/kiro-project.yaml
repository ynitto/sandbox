# kiro-project 設定（このプロジェクト専用）。
# 起動: kiro-project start --config <このファイルの絶対パス>
# 1 プロジェクト = 1 ディレクトリ（root 直下に charter.md / backlog/ / needs/ / status.json …）。
root: .kiro-project/projects/kiro-project   # 状態（charter/backlog/needs/decisions/status）の置き場
workdir: .                                  # act / verify の作業ツリー（成果物 tools/* はこのリポジトリ内）

# --- stub モード（kiro-cli/AI を呼ばずにループ機構だけを動作テスト）---
planner: none            # 優先順位付けを LLM でなく FIFO（priority＋古さ）で行う
flow_planner: stub       # kiro-flow の分解を単一ノード stub に（AI 不使用）
executor: stub           # act を kiro-flow の stub executor に委譲（no-op 成功・AI 不使用）
auto_adjudicate: false   # verify NG 時の kiro-cli 裁定ゲートを無効化（CLI 要求元）
