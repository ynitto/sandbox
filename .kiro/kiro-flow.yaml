# kiro-flow の設定。bus の既定は ./bus（kiro-project の <root>/bus と同じ場所を指す）。
bus: .kiro-project/bus

planner: stub          # 戦略選定: キーワード判定
executor: stub         # ワーカー実行: 擬似実行

granularity: finest

# agents:
#   planner:   {model: claude-opus}     # 戦略選定・分解
#   evaluator: {model: claude-sonnet}   # 継続判断・再計画
#   worker:    {model: claude-sonnet}   # 全 kind の既定
#   verify:    {model: claude-haiku}    # 個別 kind は worker より優先