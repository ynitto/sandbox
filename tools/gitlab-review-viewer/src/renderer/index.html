<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self' data:;" />
  <title>GitLab Review Viewer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>GitLab Review Viewer</h1>
        <button id="btn-settings" title="設定">⚙</button>
      </div>

      <section id="filters">
        <div class="field">
          <label for="group-search">グループ</label>
          <div class="row">
            <input id="group-search" type="text" placeholder="グループ名で検索" />
            <button id="btn-load-groups" title="グループを取得">🔍</button>
          </div>
          <select id="group-select">
            <option value="">（指定なし）</option>
          </select>
        </div>

        <div class="field">
          <label for="project-select">リポジトリ（プロジェクト）</label>
          <div class="row">
            <input id="project-search" type="text" placeholder="プロジェクト名で検索" />
            <button id="btn-load-projects" title="プロジェクトを取得">🔍</button>
          </div>
          <select id="project-select">
            <option value="">（指定なし）</option>
          </select>
        </div>

        <div class="field">
          <label for="label-input">ラベル（カンマ区切り・AND 条件）</label>
          <input id="label-input" type="text" list="label-list"
                 placeholder="例: status:review-ready,priority:high" />
          <datalist id="label-list"></datalist>
        </div>

        <div class="field">
          <label for="author-input">作成者（ユーザー名）</label>
          <div class="row">
            <input id="author-input" type="text" placeholder="例: taro.yamada" />
            <button id="btn-author-self" title="自分のユーザー名を入力">自分</button>
          </div>
        </div>

        <div class="field row2">
          <div>
            <label for="type-select">種別（候補一覧のみ）</label>
            <select id="type-select">
              <option value="both">イシュー + MR</option>
              <option value="issue">イシューのみ</option>
              <option value="mr">MR のみ</option>
            </select>
          </div>
          <div>
            <label for="state-select">状態</label>
            <select id="state-select">
              <option value="opened">オープン</option>
              <option value="closed">クローズ</option>
              <option value="merged">マージ済（MR）</option>
              <option value="all">すべて</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="keyword-input">キーワード</label>
          <input id="keyword-input" type="text" placeholder="タイトル・本文を検索" />
        </div>

        <button id="btn-search" class="primary">候補を検索</button>
      </section>

      <div id="candidate-count" class="muted"></div>
      <ul id="candidates"></ul>
    </aside>

    <main id="main">
      <div id="panes">
        <section class="pane" data-pane="0">
          <div class="pane-caption">イシュー</div>
          <div class="tabbar" id="tabbar-0"></div>
          <div class="urlbar">
            <div class="menu-wrap">
              <button data-act="menu" data-pane="0" title="ページメニュー">☰</button>
              <div class="pane-menu" id="menu-0" hidden>
                <button data-menu="reader" data-pane="0">リーダーモード（本文のみをタブ表示）</button>
                <button data-menu="summary" data-pane="0">要約を作成してタブ表示</button>
                <button data-menu="obsidian" data-pane="0">Obsidian へ送る（表示中タブ）</button>
              </div>
            </div>
            <input id="url-0" type="text" spellcheck="false" />
            <button data-act="reload" data-pane="0" title="再読み込み">↻</button>
            <button data-act="copy" data-pane="0" title="URL をコピー">⧉</button>
            <button data-act="external" data-pane="0" title="ブラウザで開く">↗</button>
          </div>
          <webview id="wv-0" partition="persist:gitlab" src="about:blank"></webview>
          <div class="local-view" id="lv-0" hidden></div>
        </section>
        <div id="splitter" title="ドラッグでペイン幅を変更"></div>
        <section class="pane" data-pane="1">
          <div class="pane-caption">マージリクエスト</div>
          <div class="tabbar" id="tabbar-1"></div>
          <div class="urlbar">
            <div class="menu-wrap">
              <button data-act="menu" data-pane="1" title="ページメニュー">☰</button>
              <div class="pane-menu" id="menu-1" hidden>
                <button data-menu="reader" data-pane="1">リーダーモード（本文のみをタブ表示）</button>
                <button data-menu="summary" data-pane="1">要約を作成してタブ表示</button>
                <button data-menu="obsidian" data-pane="1">Obsidian へ送る（表示中タブ）</button>
              </div>
            </div>
            <input id="url-1" type="text" spellcheck="false" />
            <button data-act="reload" data-pane="1" title="再読み込み">↻</button>
            <button data-act="copy" data-pane="1" title="URL をコピー">⧉</button>
            <button data-act="external" data-pane="1" title="ブラウザで開く">↗</button>
          </div>
          <webview id="wv-1" partition="persist:gitlab" src="about:blank"></webview>
          <div class="local-view" id="lv-1" hidden></div>
        </section>
      </div>

      <section id="actionbar">
        <div class="action-row">
          <span class="muted">操作対象:</span>
          <span id="target-label"></span>
          <span id="target-state" class="chip"></span>
          <span id="target-labels"></span>
        </div>
        <div class="action-row action-main">
          <textarea id="comment-input" rows="2"
                    placeholder="コメント本文を入力（各ボタン実行時に「# ボタン名」見出し付きで投稿・Ctrl+Enter で単独投稿）"></textarea>
          <div class="action-buttons">
            <div class="btn-row">
              <button id="btn-approve">承認</button>
              <button id="btn-sendback">差し戻し</button>
              <button id="btn-reject">却下</button>
            </div>
            <div class="btn-row">
              <button id="btn-change">変更</button>
              <button id="btn-comment">コメント投稿</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <dialog id="summary-dialog">
    <h2>要約</h2>
    <div id="summary-status" class="muted"></div>
    <textarea id="summary-text" rows="16" spellcheck="false"></textarea>
    <div class="dialog-buttons">
      <button id="btn-summary-to-comment">コメント欄へ挿入</button>
      <button id="btn-summary-copy">コピー</button>
      <button id="btn-summary-export">Obsidian へ送る</button>
      <button id="btn-summary-close">閉じる</button>
    </div>
  </dialog>

  <dialog id="confirm-dialog">
    <h2>確認</h2>
    <p id="confirm-desc"></p>
    <div class="dialog-buttons">
      <button id="btn-confirm-ok" class="primary">OK</button>
      <button id="btn-confirm-cancel">キャンセル</button>
    </div>
  </dialog>

  <dialog id="reject-dialog">
    <h2>却下</h2>
    <p id="reject-desc"></p>
    <ul class="muted reject-notes">
      <li><strong>削除</strong> — 同じタイトルの MR をクローズし、そのソースブランチを削除して、イシューを削除する</li>
      <li><strong>閉じる</strong> — 同じタイトルの MR をクローズし、イシューを閉じる</li>
    </ul>
    <div class="dialog-buttons">
      <button id="btn-reject-delete" class="danger">削除</button>
      <button id="btn-reject-close">閉じる</button>
      <button id="btn-reject-cancel">キャンセル</button>
    </div>
  </dialog>

  <dialog id="change-dialog">
    <h2>変更</h2>
    <div class="muted">変更するステータス / ラベルを選択して「実行」を押してください（現在付いているラベルは選択済み・点線枠）</div>
    <div id="change-presets"></div>
    <div class="dialog-buttons">
      <button id="btn-change-run" class="primary">実行</button>
      <button id="btn-change-cancel">キャンセル</button>
    </div>
  </dialog>

  <dialog id="settings-dialog">
    <h2>設定</h2>
    <div class="settings-grid">
      <label>GitLab URL</label>
      <input id="cfg-gitlab-url" type="text" placeholder="https://gitlab.com" />
      <label>アクセストークン</label>
      <input id="cfg-gitlab-token" type="password" placeholder="glpat-..." />
      <label>エージェントコマンド</label>
      <input id="cfg-agent-command" type="text" />
      <label>タイムアウト（秒）</label>
      <input id="cfg-agent-timeout" type="number" min="0" />
      <label>要約プロンプト</label>
      <textarea id="cfg-agent-prompt" rows="8" spellcheck="false"></textarea>
      <label>Obsidian Vault パス</label>
      <input id="cfg-obsidian-vault" type="text" placeholder="C:\Users\you\Documents\Vault" />
      <label>Vault 内サブフォルダ</label>
      <input id="cfg-obsidian-subdir" type="text" />
      <label>書き出し後に Obsidian を開く</label>
      <input id="cfg-obsidian-open" type="checkbox" />
      <label>ラベルプリセット（JSON）</label>
      <textarea id="cfg-label-presets" rows="8" spellcheck="false"></textarea>
      <label>操作ショートカット（JSON）</label>
      <textarea id="cfg-action-shortcuts" rows="5" spellcheck="false"></textarea>
    </div>
    <div class="dialog-buttons">
      <button id="btn-settings-save" class="primary">保存</button>
      <button id="btn-settings-cancel">キャンセル</button>
    </div>
  </dialog>

  <div id="toast" hidden></div>

  <script src="renderer.js"></script>
</body>
</html>
