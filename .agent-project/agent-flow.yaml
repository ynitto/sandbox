# agent-flow の設定（agent-project 経由の実行で読まれるのはこのファイル）。
#
# agent-project は agent-flow を cwd=<root>（= この .agent-project ディレクトリ）で起動する。
# agent-flow の設定探索は cwd 直下 → cwd/.agents → ~/.agents の順なので、ワークスペース側の
# <repo>/.agents/agent-flow.yaml は探索対象に入らない（あちらは agent-flow を repo 直下から
# 直接叩くとき用）。ここに置かないと組み込み既定（agent_cli: kiro）で worker が動く。
#
# bus は agent-project が --bus で明示的に渡すため、ここでは指定しない。

agent_cli: claude      # agents で指定しない役割（doctor 等）の既定

# agents:
#   planner:   {agent_cli: claude, model: opus}        # 戦略選定・分解
#   evaluator: {agent_cli: codex, model: gpt-5.6-sol}  # 継続判断・再計画
#   worker:    {agent_cli: claude, model: sonnet}      # 全 kind の既定
#   verify:    {agent_cli: copilot}                    # 個別 kind は worker より優先

granularity: coarse
kiro_timeout: 900
