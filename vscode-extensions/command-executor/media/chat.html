<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-__NONCE__';">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--vscode-font-family);
      font-size: var(--vscode-font-size);
      background: var(--vscode-sideBar-background);
      color: var(--vscode-sideBar-foreground);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ツールバー */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--vscode-panel-border);
      flex-shrink: 0;
    }

    #toolbar label {
      font-size: 0.85em;
      color: var(--vscode-descriptionForeground);
      white-space: nowrap;
    }

    #agent-select, #model-select {
      flex: 1;
      background: var(--vscode-dropdown-background);
      color: var(--vscode-dropdown-foreground);
      border: 1px solid var(--vscode-dropdown-border);
      padding: 3px 6px;
      border-radius: 2px;
      font-size: 0.9em;
    }

    #model-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border-bottom: 1px solid var(--vscode-panel-border);
      flex-shrink: 0;
    }

    #model-row label {
      font-size: 0.85em;
      color: var(--vscode-descriptionForeground);
      white-space: nowrap;
    }

    #model-row.hidden { display: none; }

    #clear-btn, #stop-btn, #sync-btn {
      background: var(--vscode-button-secondaryBackground);
      color: var(--vscode-button-secondaryForeground);
      border: none;
      padding: 3px 8px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.85em;
      white-space: nowrap;
    }

    #clear-btn:hover, #stop-btn:hover, #sync-btn:hover {
      background: var(--vscode-button-secondaryHoverBackground);
    }

    #sync-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #stop-btn { display: none; }
    #stop-btn.visible { display: block; }

    /* エージェント説明 */
    #agent-description {
      padding: 4px 8px;
      font-size: 0.8em;
      color: var(--vscode-descriptionForeground);
      border-bottom: 1px solid var(--vscode-panel-border);
      min-height: 22px;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* メッセージ一覧 */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      padding: 8px 10px;
      border-radius: 4px;
      word-break: break-word;
      line-height: 1.5;
    }

    .message.user {
      background: var(--vscode-inputOption-activeBackground);
      border-left: 3px solid var(--vscode-focusBorder);
      font-size: 0.9em;
      color: var(--vscode-input-foreground);
    }

    .message.assistant {
      background: var(--vscode-editor-inactiveSelectionBackground);
      white-space: pre-wrap;
      font-family: var(--vscode-editor-font-family);
      font-size: var(--vscode-editor-font-size);
    }

    .message.assistant .stderr {
      color: var(--vscode-errorForeground);
    }

    .message.system {
      color: var(--vscode-descriptionForeground);
      font-style: italic;
      font-size: 0.85em;
    }

    /* 実行中インジケーター */
    .running-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--vscode-descriptionForeground);
      font-style: italic;
      font-size: 0.85em;
    }

    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid var(--vscode-descriptionForeground);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 入力エリア */
    #input-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      border-top: 1px solid var(--vscode-panel-border);
      flex-shrink: 0;
    }

    #prompt-input {
      width: 100%;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border, transparent);
      padding: 6px 8px;
      border-radius: 2px;
      resize: vertical;
      min-height: 72px;
      font-family: var(--vscode-font-family);
      font-size: var(--vscode-font-size);
      line-height: 1.4;
    }

    #prompt-input:focus {
      outline: none;
      border-color: var(--vscode-focusBorder);
    }

    #input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #hint {
      font-size: 0.78em;
      color: var(--vscode-descriptionForeground);
    }

    #send-btn {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      padding: 5px 14px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.9em;
    }

    #send-btn:hover { background: var(--vscode-button-hoverBackground); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ファイル参照ボタン */
    #file-ref-bar {
      display: flex;
      gap: 4px;
    }

    #add-file-btn, #add-selection-btn {
      background: var(--vscode-button-secondaryBackground);
      color: var(--vscode-button-secondaryForeground);
      border: none;
      padding: 2px 8px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 0.8em;
      white-space: nowrap;
    }

    #add-file-btn:hover, #add-selection-btn:hover {
      background: var(--vscode-button-secondaryHoverBackground);
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <label for="agent-select">Agent:</label>
    <select id="agent-select">
      __AGENT_OPTIONS_HTML__
    </select>
    <button id="stop-btn" title="実行中のコマンドを停止">Stop</button>
    <button id="clear-btn" title="メッセージをクリア">Clear</button>
    <button id="sync-btn" title="~/.copilot/ を各 CLI ホームへ同期">Sync</button>
  </div>

  <div id="model-row" class="hidden">
    <label for="model-select">Model:</label>
    <select id="model-select">
      <option value="">Default</option>
    </select>
  </div>

  <div id="agent-description"></div>

  <div id="messages"></div>

  <div id="input-area">
    <div id="file-ref-bar">
      <button id="add-file-btn" title="アクティブなファイルを参照として追加 (#file:path)">+ File</button>
      <button id="add-selection-btn" title="選択中の行を参照として追加 (#file:path:start-end)">+ Selection</button>
    </div>
    <textarea id="prompt-input" placeholder="プロンプトを入力 (Ctrl+Enter で送信)&#10;#file:path や #file:path:10-20 でファイル参照を挿入できます"></textarea>
    <div id="input-footer">
      <span id="hint">Ctrl+Enter で送信</span>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- 初期データ (JSON): 拡張機能ホストから渡される履歴とモデルキャッシュ -->
  <script id="chat-data" type="application/json">__CHAT_DATA_JSON__</script>

  <script nonce="__NONCE__">
    (function() {
      const vscode = acquireVsCodeApi();
      const persisted = vscode.getState() || {};

      // 初期データ読み込み
      const chatData = JSON.parse(document.getElementById('chat-data').textContent || '{}');
      const initialHistory = chatData.history || [];
      let toolModelsMap = chatData.toolModels || {};
      // フェッチ済みツールを追跡してセッション内で重複フェッチを防ぐ
      const modelsFetched = new Set();
      // モデル選択を復元する（globalState 由来の chatData を優先、次に WebView 永続化状態）
      let desiredModel = chatData.selectedModel || persisted.selectedModel || '';

      const messagesEl = document.getElementById('messages');
      const promptInput = document.getElementById('prompt-input');
      const sendBtn = document.getElementById('send-btn');
      const stopBtn = document.getElementById('stop-btn');
      const clearBtn = document.getElementById('clear-btn');
      const agentSelect = document.getElementById('agent-select');
      const agentDescription = document.getElementById('agent-description');
      const syncBtn = document.getElementById('sync-btn');
      const addFileBtn = document.getElementById('add-file-btn');
      const addSelectionBtn = document.getElementById('add-selection-btn');
      const modelRow = document.getElementById('model-row');
      const modelSelect = document.getElementById('model-select');

      if (!messagesEl || !promptInput || !sendBtn || !stopBtn || !clearBtn || !agentSelect || !agentDescription || !syncBtn) {
        return;
      }

      // WebView の再読み込み後も前回選択したエージェントを復元する
      if (persisted.selectedAgentId && Array.from(agentSelect.options).some((o) => o.value === persisted.selectedAgentId)) {
        agentSelect.value = persisted.selectedAgentId;
      }

      /** ツールに応じてモデルドロップダウンを更新する */
      function updateModelSelect(tool) {
        if (!modelSelect) { return; }
        const models = toolModelsMap[tool] || [];
        modelSelect.innerHTML = '';
        const defaultOpt = document.createElement('option');
        defaultOpt.value = '';
        defaultOpt.textContent = 'Default';
        modelSelect.appendChild(defaultOpt);
        for (const id of models) {
          const opt = document.createElement('option');
          opt.value = id;
          opt.textContent = id;
          modelSelect.appendChild(opt);
        }
        // 保存済みのモデル選択を復元する
        if (desiredModel && models.includes(desiredModel)) {
          modelSelect.value = desiredModel;
        }
      }

      /**
       * モデル選択をサポートするツールかどうかを判定して表示/非表示・内容を更新。
       * キャッシュがあれば即時表示し、未フェッチの場合はバックグラウンドでフェッチを依頼する。
       */
      function updateModelRow() {
        const selected = agentSelect.options[agentSelect.selectedIndex];
        const tool = selected ? selected.getAttribute('data-tool') : '';
        const supportsModel = tool === 'claude' || tool === 'kiro-cli';
        if (modelRow) { modelRow.classList.toggle('hidden', !supportsModel); }
        if (!supportsModel) { return; }

        // キャッシュ（フォールバックを含む）を即時表示して Loading を出さない
        updateModelSelect(tool);

        // セッション内で一度だけフェッチして最新モデルに更新する
        if (!modelsFetched.has(tool)) {
          modelsFetched.add(tool);
          vscode.postMessage({ type: 'fetchModels', tool });
        }
      }

      updateModelRow();
      agentSelect.addEventListener('change', updateModelRow);

      if (modelSelect) {
        modelSelect.addEventListener('change', function() {
          desiredModel = modelSelect.value;
          // WebView 永続化状態にも保存（HTML 再生成なしの再表示時に備える）
          const prev = vscode.getState() || {};
          vscode.setState(Object.assign({}, prev, { selectedModel: desiredModel }));
          vscode.postMessage({ type: 'modelChanged', model: desiredModel });
        });
      }

      function notifyAgentChanged() {
        const prev = vscode.getState() || {};
        vscode.setState(Object.assign({}, prev, { selectedAgentId: agentSelect.value }));
        vscode.postMessage({ type: 'agentChanged', agentId: agentSelect.value });
      }

      notifyAgentChanged();
      agentSelect.addEventListener('change', notifyAgentChanged);

      let currentAssistantEl = null;
      let currentOutputEl = null;
      let running = false;

      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setRunning(val) {
        running = val;
        sendBtn.disabled = val;
        stopBtn.classList.toggle('visible', val);
      }

      function updateDescription() {
        const selected = agentSelect.options[agentSelect.selectedIndex];
        agentDescription.textContent = selected ? (selected.title || '') : '';
      }

      updateDescription();
      agentSelect.addEventListener('change', updateDescription);

      /** 保存済み履歴エントリを DOM に追加する */
      function renderHistoryEntry(entry) {
        if (entry.role === 'user') {
          const div = document.createElement('div');
          div.className = 'message user';
          div.textContent = entry.content || '';
          messagesEl.appendChild(div);
        } else if (entry.role === 'assistant') {
          const div = document.createElement('div');
          div.className = 'message assistant';
          if (entry.stdout) {
            const out = document.createElement('span');
            out.textContent = entry.stdout;
            div.appendChild(out);
          }
          if (entry.stderr) {
            const err = document.createElement('div');
            err.className = 'stderr';
            err.textContent = entry.stderr;
            div.appendChild(err);
          }
          messagesEl.appendChild(div);
        }
      }

      // 保存済み履歴を復元する
      for (const entry of initialHistory) {
        renderHistoryEntry(entry);
      }
      if (initialHistory.length > 0) { scrollToBottom(); }

      sendBtn.addEventListener('click', function() {
        const prompt = promptInput.value.trim();
        const agentId = agentSelect.value;
        if (!prompt || !agentId || running) { return; }

        const div = document.createElement('div');
        div.className = 'message user';
        div.textContent = prompt;
        messagesEl.appendChild(div);
        scrollToBottom();

        setRunning(true);
        currentAssistantEl = document.createElement('div');
        currentAssistantEl.className = 'message assistant';

        const indicator = document.createElement('div');
        indicator.className = 'running-indicator';
        indicator.innerHTML = '<div class="spinner"></div><span>実行中...</span>';
        currentAssistantEl.appendChild(indicator);

        currentOutputEl = document.createElement('span');
        currentAssistantEl.appendChild(currentOutputEl);
        messagesEl.appendChild(currentAssistantEl);
        scrollToBottom();

        promptInput.value = '';
        const model = modelSelect ? modelSelect.value : '';
        vscode.postMessage({ type: 'run', agentId: agentId, prompt: prompt, model: model || undefined });
      });

      promptInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          sendBtn.click();
        }
      });

      stopBtn.addEventListener('click', function() {
        vscode.postMessage({ type: 'kill' });
        setRunning(false);
        currentAssistantEl = null;
        currentOutputEl = null;
      });

      clearBtn.addEventListener('click', function() {
        messagesEl.innerHTML = '';
        vscode.postMessage({ type: 'clearHistory' });
      });

      syncBtn.addEventListener('click', function() {
        syncBtn.disabled = true;
        syncBtn.textContent = 'Syncing...';
        vscode.postMessage({ type: 'sync' });
      });

      if (addFileBtn) {
        addFileBtn.addEventListener('click', function() {
          vscode.postMessage({ type: 'addFile' });
        });
      }

      if (addSelectionBtn) {
        addSelectionBtn.addEventListener('click', function() {
          vscode.postMessage({ type: 'addSelection' });
        });
      }

      window.addEventListener('message', function(event) {
        const msg = event.data || {};

        switch (msg.type) {
          case 'data':
            if (currentAssistantEl && currentOutputEl) {
              const indicator = currentAssistantEl.querySelector('.running-indicator');
              if (indicator) { indicator.remove(); }
              currentOutputEl.textContent += msg.text;
              scrollToBottom();
            }
            break;

          case 'error':
            if (currentAssistantEl) {
              const indicator = currentAssistantEl.querySelector('.running-indicator');
              if (indicator) { indicator.remove(); }
              const err = document.createElement('div');
              err.className = 'stderr';
              err.textContent = msg.text;
              currentAssistantEl.appendChild(err);
              scrollToBottom();
            }
            break;

          case 'done':
            setRunning(false);
            currentAssistantEl = null;
            currentOutputEl = null;
            break;

          case 'syncDone':
            syncBtn.disabled = false;
            syncBtn.textContent = 'Sync';
            break;

          case 'toolModels': {
            if (msg.toolModels && typeof msg.toolModels === 'object') {
              toolModelsMap = Object.assign(toolModelsMap, msg.toolModels);
              // 現在選択中のツールのドロップダウンを再構築
              updateModelRow();
            }
            break;
          }

          case 'insertText': {
            const pos = promptInput.selectionStart;
            const before = promptInput.value.slice(0, pos);
            const after = promptInput.value.slice(promptInput.selectionEnd);
            promptInput.value = before + msg.text + after;
            const newPos = pos + msg.text.length;
            promptInput.selectionStart = promptInput.selectionEnd = newPos;
            promptInput.focus();
            break;
          }
        }
      });
    })();
  </script>
</body>
</html>
