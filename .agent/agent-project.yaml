# agent-project の設定（1 root = 1 プロジェクト。相対パスはすべて root 基準）。
# root = cwd。charter.md / backlog/ / bus/ 等はすべて root 直下に集約される。
# workdir / bus は既定（root / <root>/bus）に任せるため指定しない。
root: .agent-project

# manage_flow_daemon は既定（false）のまま。安易に true にしないこと:
# submit 経路は run-id を「backlog パスの hash」から作り、local 経路（run --run-id）は
# 「task.id の hash」から作る。**同じタスクなのに id が変わる**ため、daemon を on/off した
# 瞬間（daemon が落ちて local へフォールバックしたときも）既存 run に合流できず、
# 進捗をゼロから作り直す。実際 true にした瞬間、実行中の 2 本（4/23・4/16）が捨てられた。
# submit では planner/executor も制御できない。

# planner: none
# executor: stub
# route_planner: none    # 書込先の auto-route（曖昧時の LLM 推定）を無効化。

# flow_planner: flow-planner   # 既定。スキル（scripts/plan.py）は agent-flow の
                               # agents: planner: {agent_cli, model} に従って動く（--agent-cli 伝搬）。
                               # agent にすると スキルを使わず agent_cli で直接計画する。

# auto_adjudicate: false # 人へ回す前の裁定ゲートを呼ばない（常にそのまま人へ）
# distill_learn: false   # 人コメントの蒸留をせず生のまま learn 化

# spec_track: true       # spec ルーティング（採点/policy で spec 前段を前置）。agent-project の設定
                       # （agent-flow.yaml に書いても効かない）

# 一貫性ゲート（codd-gate 連携）: done 確定前の回帰ゲート（regression）と
# 負債の修復タスク自動投入（intake）。repos.json は <root>/repos.json（このプロジェクトは
# 手書きが正・URL のみ）。実行時 cwd は常に root（mr.py の _settle_task が cfg.workdir で実行）。
#
# 差分モード（verify --base "$KIRO_BASE_REV"）はここでは成立しない:
#   - repos.json の src は URL のみでローカル checkout が無く、--repo-dir 無しでは
#     「スキャン可能な repo がありません」で必ず落ちる（回帰ゲートが全 done をブロックする）。
#   - $KIRO_BASE_REV は root（状態 worktree = agent-state ブランチ）の rev で、src（main）の
#     差分基準として意味を持たない。
# そのため負債ラチェット（--debt）+ --sync（origin から取得。共有ミラーを再利用）にする。
# しきい値は 2026-07-17 実測の現在負債（ratchet 基準。負債を返すたびに下げてよい）:
#   broken=1563 / undocumented=354 / untested=444
regression_cmd: 'codd-gate verify --debt --sync --repos repos.json --max-broken 1563 --max-undocumented 354 --max-untested 444'
intake_cmd: 'codd-gate tasks --debt --sync --repos repos.json'

# グローバル既定
agent_cli: claude
model: auto
agents:
  plan:     {agent_cli: cursor, model: cursor-grok-4.5-high}  # 分解・再計画・差し戻し修正
  assess:   {model: haiku}                                    # 大量に走る採点は安いモデルに
  verify:   {agent_cli: codex, model: gpt-5.6-sol}            # verify 合成

act_timeout: 3600
