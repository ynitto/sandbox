io_contract:
  input:
    - name: doc_paths
      format: file-reference
      description: "検証対象のドキュメント（省略時は README*/docs/** 等を自動探索して候補提示）"
      required: false
    - name: codebase_root
      format: file-reference
      description: "突き合わせ先のコードベースのルート（省略時はカレントリポジトリ）"
      required: false
    - name: focus
      format: free-text
      description: "重点的に検証したい観点・領域（例: ビルド手順だけ、APIドキュメントだけ）"
      required: false
  output:
    - name: drift_report
      format: markdown
      schema: ".drift-work/drift-report.md — サマリ表・証拠ペア付き指摘一覧・要確認リストを含む"
      required: true
    - name: claims
      format: json
      schema: ".drift-work/claims.json — 抽出した claim と verified/drifted/unverifiable の検証結果"
      required: true
