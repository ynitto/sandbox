io_contract:
  input:
    - name: user_context
      format: free-text
      description: "ユーザーが作りたいものの説明（任意。未指定時は対話で収集）"
      required: false
  output:
    - name: requirements_json
      format: json
      schema: "requirements.json (F-/N-/P- prefix, MoSCoW priority)"
      required: true
    - name: traceability_matrix_md
      format: markdown
      schema: "traceability-matrix.md (AC × 実装/テスト対応表。Step 9 実行時のみ出力)"
      required: false
