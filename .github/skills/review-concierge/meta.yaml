io_contract:
  input:
    - name: selector
      format: free-text
      description: >-
        対象を限定するセレクタ。gl.py に渡すフィルタ（--label / --state / --assignee）か、
        明示の MR/イシュー IID 群。スキルはステータスを内部で限定しないため、絞り込み方針は
        呼び出し側がここで与える。省略時は opened を対象にし、件数が多ければ範囲を確認する。
      required: false
    - name: output_target
      format: free-text
      description: >-
        成果物の出力先。Obsidian Vault のパス（→ obsidian-use）、.html ファイル（→ spec-to-readable-html）、
        Markdown ファイル/ディレクトリ、または stdout。出力先に応じて整形を委譲する。
      required: false
    - name: writeback_policy
      format: free-text
      description: >-
        任意。人間が成果物に記入した decision を GitLab へ書き戻す際のポリシー
        （承認/レビュー ラベル名、approve でマージまで許可するか等）。省略時は writeback しない（生成のみ）。
      required: false
  output:
    - name: decision_packet
      format: markdown|html
      schema: >-
        必読3点 / 受け入れ条件トレーサビリティ / 観点別所見(信頼度つき) / リスク段階開示 を
        段階開示で含む「1枚見て決める」成果物。出力先スキルの形式に整形して output_target へ書き出す。
      required: true
notes:
  - スケジューリング（間隔・常駐）は呼び出し側（/loop・cron・kiro-loop 等）の責務。スキルは1回処理に徹する。
  - GitLab 操作は gitlab-idd の scripts/gl.py を再利用する（GITLAB_TOKEN 必須）。
  - レビュー観点は agent-reviewer の references/ を再利用する。
